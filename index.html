<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LimeCraft Wiki</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
        }

        /* Боковая панель */
        .sidebar {
            width: 260px;
            background: #2c3e50;
            color: white;
            padding: 20px 0;
            overflow-y: auto;
            position: fixed;
            height: 100vh;
            left: 0;
            top: 0;
        }

        .sidebar h2 {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #34495e;
            margin-bottom: 20px;
            font-weight: 400;
            letter-spacing: 1px;
        }

        .sidebar ul {
            list-style: none;
        }

        .sidebar li {
            padding: 12px 25px;
            cursor: pointer;
            transition: background 0.2s, border-left 0.2s;
            border-left: 4px solid transparent;
            font-size: 16px;
        }

        .sidebar li:hover {
            background: #34495e;
            border-left-color: #e67e22;
        }

        .sidebar .active {
            background: #1e2b38;
            border-left-color: #e67e22;
            font-weight: 500;
        }

        /* Вложенные подпункты */
        .submenu {
            list-style: none;
            margin-left: 20px;
            margin-top: 5px;
            display: none;
        }

        .submenu li {
            padding: 8px 20px;
            font-size: 14px;
            border-left: 2px solid #3e5a6f;
        }

        .sidebar li.open + .submenu,
        .submenu:hover {
            display: block;
        }

        /* Основной контент */
        .main {
            flex: 1;
            margin-left: 260px;
            padding: 40px;
            background: #f5f7fa;
            min-height: 100vh;
        }

        .content-box {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            max-width: 1000px;
            margin: 0 auto;
        }

        .content-box h1 {
            color: #2c3e50;
            margin-bottom: 20px;
            font-weight: 500;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .content-box p {
            line-height: 1.7;
            color: #2c3e50;
            font-size: 16px;
            margin-bottom: 15px;
        }

        /* Стили для правил */
        .rules-container {
            margin-top: 20px;
        }

        .rule-section {
            margin-bottom: 25px;
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px 20px;
            border-left: 4px solid #e67e22;
        }

        .rule-section h3 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 18px;
            font-weight: 600;
        }

        .rule-list {
            list-style-type: none;
            padding-left: 20px;
        }

        .rule-list li {
            margin-bottom: 12px;
            line-height: 1.6;
            color: #34495e;
            position: relative;
            padding-left: 25px;
        }

        .rule-list li:before {
            content: "•";
            color: #e67e22;
            font-weight: bold;
            position: absolute;
            left: 5px;
        }

        .rule-subsection {
            margin-top: 15px;
            padding-left: 20px;
            border-left: 2px solid #e67e22;
        }

        .rule-subsection h4 {
            color: #2c3e50;
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: 600;
        }

        .rule-subsection ul {
            list-style-type: none;
            padding-left: 20px;
        }

        .rule-subsection li {
            margin-bottom: 8px;
            line-height: 1.5;
            color: #34495e;
            position: relative;
            padding-left: 20px;
        }

        .rule-subsection li:before {
            content: "–";
            color: #e67e22;
            position: absolute;
            left: 0;
        }

        .important-note {
            background: #fff3e0;
            padding: 12px 15px;
            border-radius: 6px;
            margin: 15px 0;
            border-left: 4px solid #e67e22;
            font-style: italic;
        }

        /* Стили для команд */
        .commands-container {
            display: flex;
            flex-direction: column;
            gap: 30px;
            margin-top: 20px;
        }

        .command-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            border-left: 4px solid #e67e22;
        }

        .command-section h3 {
            color: #2c3e50;
            margin-bottom: 15px;
            font-size: 22px;
            font-weight: 600;
            border-bottom: 1px solid #ecf0f1;
            padding-bottom: 10px;
        }

        .command-block {
            background: #2c3e50;
            color: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 15px 0;
            overflow-x: auto;
            white-space: nowrap;
        }

        .command-block code {
            color: #e67e22;
            font-size: 16px;
        }

        .command-section ul {
            list-style: none;
            margin-top: 10px;
        }

        .command-section li {
            margin-bottom: 10px;
            padding-left: 25px;
            position: relative;
            line-height: 1.5;
        }

        .command-section li:before {
            content: "•";
            color: #e67e22;
            font-weight: bold;
            position: absolute;
            left: 5px;
        }

        .command-section p {
            margin: 10px 0;
            line-height: 1.6;
        }

        .command-section strong {
            color: #e67e22;
        }

        /* Сетка для карточек с крафтами */
        .craft-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .craft-card {
            background: #f9f9f9;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.03);
            transition: transform 0.2s;
        }

        .craft-card:hover {
            transform: translateY(-5px);
        }

        .craft-card img {
            max-width: 100%;
            border-radius: 6px;
            margin-bottom: 10px;
            background: #eee;
            min-height: 120px;
            object-fit: cover;
        }

        .craft-caption {
            font-style: italic;
            color: #7f8c8d;
            font-size: 14px;
        }

        /* Мобильная адаптация */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 10px 0;
            }
            .main {
                margin-left: 0;
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<!-- Боковая панель -->
<div class="sidebar">
    <h2>LimeCraft Wiki</h2>
    <ul>
        <li onclick="showContent('home')">Главная</li>
        <li onclick="showContent('about')">Как зайти?</li>
        <li onclick="showContent('contact')">Правила</li>
        <li onclick="toggleSubmenu(this)">Механики<span style="float:right;">▼</span></li>
        <ul class="submenu">
            <li onclick="showContent('mech1')">Особые крафты</li>
            <li onclick="showContent('mech2')">Пивоварение</li>
            <li onclick="showContent('mech3')">Команды</li>
        </ul>
    </ul>
</div>

<!-- Основная область -->
<div class="main" id="main-content">
    <div class="content-box" id="content-display">
        <h1>Добро пожаловать!</h1>
        <p>Выберите раздел в боковом меню.</p>
        <p>Здесь может быть ваш текст, описание проекта или любая информация.</p>
    </div>
</div>

<script>
    // Функция для показа контента
    function showContent(section) {
        // Сохраняем выбранный раздел
        localStorage.setItem('lastSection', section);

        const contentDiv = document.getElementById('content-display');
        let title = '';
        let text = '';

        switch(section) {
            case 'home':
                title = '🏠 Главная';
                text = '<p>Это главная страница. Здесь можно разместить приветствие, новости или краткое описание сайта.</p>';
                break;
            case 'about':
                title = 'ℹ️ Как зайти?';
                text = '<p>Мы — ЛаймКрафт, создающие полезные и интересные проекты. Наша цель — делиться знаниями и помогать другим.</p><p><strong>Айпи:</strong> play.limecraft.ru или limecraft.mc-world.xyz</p>';
                break;
            case 'mech1':
                title = '🔧 Особые крафты';
                text = `
                    <p>На этой странице собраны все особые рецепты крафтов, доступные на сервере LimeCraft. Ниже вы найдёте изображения и описания каждого предмета.</p>

                    <div style="display: flex; flex-direction: column; gap: 40px; margin-top: 30px;">

                        <div style="text-align: center;">
                            <img src="images/image_2026-01-17_14-12-42.png"
                                 alt="лупа"
                                 style="width: 100%; max-width: 600px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
                            <div style="font-style: italic; color: #7f8c8d; margin-top: 15px; font-size: 18px; border-bottom: 1px dashed #ccc; padding-bottom: 20px;">
                                Лупа. Смотрите кто украл ваши вещи. Активируется когда меняешь слот с лупой на другой и возвращаешь обратно.
                            </div>
                        </div>

                        <div style="text-align: center;">
                            <img src="images/photo_2026-01-17_14-19-29.jpg"
                                 alt="Печенька с предсказанием"
                                 style="width: 100%; max-width: 600px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
                            <div style="font-style: italic; color: #7f8c8d; margin-top: 15px; font-size: 18px; border-bottom: 1px dashed #ccc; padding-bottom: 20px;">
                                Печенька с предсказанием. Съешь и узнай, что тебе подготовила судьба!
                            </div>
                        </div>

                        <div style="text-align: center;">
                            <img src="images/photo_2025-11-22_23-38-43.jpg"
                                 alt="Рагу роста"
                                 style="width: 100%; max-width: 600px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
                            <div style="font-style: italic; color: #7f8c8d; margin-top: 15px; font-size: 18px; border-bottom: 1px dashed #ccc; padding-bottom: 20px;">
                                Рагу роста. При поедании увеличиваешься в размерах.
                            </div>
                        </div>

                        <div style="text-align: center;">
                            <img src="images/photo_2026-03-09_21-56-18.jpg"
                                 alt="Рагу уменьшения"
                                 style="width: 100%; max-width: 600px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
                            <div style="font-style: italic; color: #7f8c8d; margin-top: 15px; font-size: 18px; border-bottom: 1px dashed #ccc; padding-bottom: 20px;">
                                Рагу уменьшения. При поедании уменьшаешься в размерах.
                            </div>
                        </div>

                        <div style="text-align: center;">
                            <img src="images/keycard.png"
                                 alt="Ключ-карта"
                                 style="width: 100%; max-width: 600px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
                            <div style="font-style: italic; color: #7f8c8d; margin-top: 15px; font-size: 18px; border-bottom: 1px dashed #ccc; padding-bottom: 20px;">
                                Ключ-карта. Служит для открывания железных люков и дверей. Потенциал данного предмета изучен не до конца.
                            </div>
                        </div>

                        <div style="text-align: center;">
                            <img src="images/petarda.png"
                                 alt="Петарда"
                                 style="width: 100%; max-width: 600px; border-radius: 16px; box-shadow: 0 10px 30px rgba(0,0,0,0.15);">
                            <div style="font-style: italic; color: #7f8c8d; margin-top: 15px; font-size: 18px; border-bottom: 1px dashed #ccc; padding-bottom: 20px;">
                                Петарда. Бум!
                            </div>
                        </div>

                        <!-- Добавляй ещё блоки точно так же -->

                    </div>
                `;
                break;
            case 'mech2':
                title = '🍺 Пивоварение (BreweryX)';
                text = '<p><strong>Описание:</strong> Вторая механика управляет динамическими сценариями. Она активируется при определённых условиях и может менять поведение интерфейса.</p><p>Пример: анимации, плавные переходы, адаптивные подсказки.</p>';
                break;
            case 'mech3':
                title = '🎨 Команды';
                text = `
                    <div class="commands-container">
                        <div class="command-section">
                            <h3>💌 Валентинки</h3>
                            <p>Чтобы создать валентинку, вам нужно иметь <strong>15 штук бумаги</strong> и написать команду:</p>
                            <div class="command-block">
                                <code>/valentin "&lt;ваш текст&gt;"</code>
                            </div>
                        </div>

                        <div class="command-section">
                            <h3>🎵 Музыкальные пластинки</h3>
                            <p>Команда для создания пластинки:</p>
                            <div class="command-block">
                                <code>/cd create &lt;имя файла.mp3&gt; &lt;имя для пластинки&gt;</code>
                            </div>
                            <ul>
                                <li><strong>Как работает:</strong> нужно держать пластинку в руке</li>
                                <li><strong>&lt;имя файла.mp3&gt;</strong> — файл музыки, который загружен на сервер</li>
                                <li><strong>Хотите загрузить свою музыку?</strong> Скиньте её в обсуждение в Telegram</li>
                            </ul>
                        </div>

                        <div class="command-section">
                            <h3>🖼️ Скины</h3>
                            <div class="command-block">
                                <code>/skin url &lt;ссылка на ваш скин&gt; SLIM or WIDE</code><br>
                                <code>/skin set &lt;имя учетной записи&gt; SLIM or WIDE</code>
                            </div>
                            <p><strong>SLIM</strong> — для тонкой модели скина (например, Java-скины новых версий)</p>
                            <p><strong>WIDE</strong> — для стандартной широкой модели</p>
                        </div>

                        <div class="command-section">
                            <h3>🪑 GSit (Сиденье)</h3>
                            <div class="command-block">
                                <code>/sit</code>
                            </div>
                            <ul>
                                <li>Позволяет сесть на любой блок</li>
                                <li>Работает даже на чужих территориях (обходит приваты)</li>
                                <li>Если встать на ступеньку, плиту или ковёр — игрок автоматически сядет ровно</li>
                                <li><strong>Альтернатива:</strong> нажмите ПКМ пустой рукой по ступеньке</li>
                            </ul>

                            <div class="command-block" style="margin-top: 15px;">
                                <code>/lay</code>
                            </div>
                            <ul>
                                <li>Позволяет лечь где угодно</li>
                                <li>Голова игрока окажется на том блоке, на котором он стоял</li>
                            </ul>
                        </div>
                    </div>
                `;
                break;
            case 'contact':
                title = '📜 Правила сервера';
                text = `
                    <div class="important-note">
                        ⚠️ Незнание правил не освобождает игрока от ответственности за их нарушение!
                    </div>

                    <div class="rules-container">
                        <div class="rule-section">
                            <h3>Общие правила</h3>
                            <ul class="rule-list">
                                <li><strong>1.</strong> Уважайте других игроков. Не оскорбляйте, не тролльте и не провоцируйте конфликты.</li>
                                <li><strong>2.</strong> Запрещено использование читов, модов или любых других программ, которые дают преимущество перед другими игроками.</li>
                                <li><strong>3.</strong> Не разрушайте и не воруйте чужие постройки. Уважайте труд других игроков. Не вносите изменения в постройку без разрешения автора.</li>
                                <li><strong>4.</strong> Не создавайте лишний шум или беспорядок на сервере. Соблюдайте общественный порядок.</li>
                                <li><strong>5.</strong> Соблюдайте правила PvP (игрок против игрока). Не убивайте других игроков без их согласия.</li>
                                <li><strong>6.</strong> Запрещено распространение ненормативной лексики и контент, нарушающий законы о защите авторских прав.</li>
                                <li><strong>7.</strong> Помогайте новым игрокам освоиться на сервере и отвечайте на их вопросы.</li>
                                <li><strong>8.</strong> Соблюдайте указания администрации сервера и следуйте их указаниям.</li>
                                <li><strong>9.</strong> В случае конфликтов или нарушений, обращайтесь к суду для разрешения проблемы.</li>
                                <li><strong>10.</strong> Наслаждайтесь игрой и создавайте уютное и дружелюбное сообщество на сервере!</li>
                            </ul>
                        </div>

                        <div class="rule-section">
                            <h3>Правила выдачи чеков</h3>
                            <ul class="rule-list">
                                <li><strong>11.</strong> Каждому человеку выдаётся ровно один чек! Игрок не имеет права получить чек, если он его получал с другого аккаунта или если он заключённый. Доставщик - тот, кто выдаёт чек.</li>
                            </ul>
                            <div class="rule-subsection">
                                <h4>11.1. Нарушения при выдаче чеков</h4>
                                <ul>
                                    <li>Если окажется, что игрок, кому был выдан чек, уже получал чек с другого аккаунта, то он обязывается вернуть все деньги, полученные нелегально, банку.</li>
                                    <li>Доставщик, который выдал чек с нарушением, должен извиниться. Если это повторится, то он теряет должность доставщика.</li>
                                </ul>
                            </div>
                        </div>

                        <div class="rule-section">
                            <h3>Правила употребления алкоголя ("углеголь")</h3>
                            <p><em>Углеголь - напитки, перечисленные в этом списке: Вино, водка, пиво, ликер, ром, виски, текила, абсент, джин.</em></p>

                            <div class="rule-subsection">
                                <h4>12.1. Употребление</h4>
                                <ul>
                                    <li>Нельзя употреблять углеголь, если ты наиграл меньше 12 часов.</li>
                                    <li>Наказания:
                                        <ul style="margin-left: 20px; margin-top: 5px;">
                                            <li>1-й раз: штраф 100 зелларов</li>
                                            <li>2-й раз: штраф 200 зелларов</li>
                                            <li>3-й раз: тюрьма на 1 день</li>
                                            <li>4-й раз: тюрьма на 3 дня</li>
                                        </ul>
                                    </li>
                                </ul>
                            </div>

                            <div class="rule-subsection">
                                <h4>12.2. Производство</h4>
                                <ul>
                                    <li>Нельзя производить углеголь без разрешения. Разрешение можно получить у Ярика (Kirrya12YR).</li>
                                    <li>Если обнаружится, что игрок производит углеголь без разрешения, то Ярик принимает решение сам (вплоть до изъятия бизнеса и всех составляющих в пользу Ярика и тюрьмы до 5 дней).</li>
                                </ul>
                            </div>

                            <div class="rule-subsection">
                                <h4>12.3. Поведение в общественных местах</h4>
                                <ul>
                                    <li>Нельзя находиться пьяным в общественных местах: Центральный перекрёсток, здание суда, банк, территории, защищённые ЛаймНэско.</li>
                                </ul>
                            </div>
                        </div>

                        <div class="rule-section">
                            <h3>ЛаймНэско - защита природы</h3>
                            <p><em>ЛаймНэско - серверная организация, занимающаяся защитой природы и ландшафта уникальных территорий. Ответственный за ЛаймНэско - Аким (Ak2009)</em></p>

                            <div class="rule-subsection">
                                <h4>13.1. Основное правило</h4>
                                <ul>
                                    <li>Территории, защищённые ЛаймНэско, нельзя разрушать, изменять, улучшать, засорять блоками или портить в любом другом виде.</li>
                                    <li>Наказание зависит от размера ущерба: от восстановления ущерба при маленьком ущербе до тюрьмы на 7 дней при полном уничтожении.</li>
                                </ul>
                            </div>

                            <div class="rule-subsection">
                                <h4>13.2. Список защищённых территорий</h4>
                                <ul>
                                    <li>Центральный перекрёсток</li>
                                    <li>Нулевой Голем</li>
                                    <li>Острова Правосудия</li>
                                    <li>Острова Испытаний</li>
                                    <li>Незерский Переулок</li>
                                    <li>Фармилка Золота</li>
                                    <li>Земли Огня</li>
                                    <li>Остров Короля Ифритов</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
                break;
            default:
                title = 'Страница не найдена';
                text = '<p>Такого раздела пока нет.</p>';
        }

        contentDiv.innerHTML = `<h1>${title}</h1>${text}`;

        // Подсветка активного пункта меню
        document.querySelectorAll('.sidebar li').forEach(li => li.classList.remove('active'));

        // Ищем пункт меню, который содержит этот раздел
        if (event && event.target) {
            event.target.classList.add('active');
        } else {
            // Если нет event (например при загрузке), подсвечиваем через сохранённый раздел
            highlightMenuItem(section);
        }
    }

    // Функция для показа/скрытия подменю (по клику на "Механики")
    function toggleSubmenu(element) {
        const submenu = element.nextElementSibling;
        if (submenu && submenu.classList.contains('submenu')) {
            if (submenu.style.display === 'block') {
                submenu.style.display = 'none';
                element.innerHTML = 'Механики <span style="float:right;">▼</span>';
            } else {
                submenu.style.display = 'block';
                element.innerHTML = 'Механики <span style="float:right;">▲</span>';
            }
        }
    }

    // Функция для подсветки пункта меню (особенно для подпунктов)
    function highlightMenuItem(section) {
        document.querySelectorAll('.sidebar li').forEach(li => {
            // Проверяем, есть ли у этого пункта onclick с нужным разделом
            const onclick = li.getAttribute('onclick');
            if (onclick && onclick.includes(section)) {
                li.classList.add('active');
            }
        });

        // Особый случай для механик (подпункты не сохраняют активное состояние красиво)
        if (section.startsWith('mech')) {
            // Подсвечиваем родительский пункт "Механики"
            const mechanicsItem = Array.from(document.querySelectorAll('.sidebar li')).find(
                li => li.innerText.includes('Механики')
            );
            if (mechanicsItem) mechanicsItem.classList.add('active');

            // Автоматически раскрываем подменю, если нужно
            const submenu = document.querySelector('.submenu');
            if (submenu && submenu.style.display !== 'block') {
                // Имитируем клик на "Механики"
                const mechanicsToggle = Array.from(document.querySelectorAll('.sidebar li')).find(
                    li => li.innerText.includes('Механики')
                );
                if (mechanicsToggle) {
                    mechanicsToggle.click();
                }
            }
        }
    }

    // Инициализация: при загрузке показываем последнюю открытую страницу
    window.onload = function() {
        // По умолчанию подменю скрыто
        const submenu = document.querySelector('.submenu');
        if (submenu) submenu.style.display = 'none';

        // Читаем сохранённый раздел
        const lastSection = localStorage.getItem('lastSection');

        if (lastSection) {
            // Показываем сохранённый раздел
            showContent(lastSection);
        } else {
            // Если ничего не сохранено, показываем главную
            showContent('home');
        }
    };
</script>

</body>
</html>
